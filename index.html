<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial scale=1.0">
    <title>Generator de Peptide</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        
        <div class="cutieComenzi">

            <h1 style="font-family:Georgia, 'Times New Roman', Times, serif ; color:#15063d; margin-bottom:0">GENERATOR DE PEPTIDE</h1>
            <h3 style="font-family:Georgia, 'Times New Roman', Times, serif ; color:#15063d ; margin-top: 5px; margin-bottom: 40px;">Autori: Codrin Ciani si Matei Leu</h3>
            <div class = "control-slider">
                <label for="carbonslider" style="font-weight: bold; color:#15063d" >Numarul de atomi de carbon (C):</label>
                <span class="valoareC" id="carbonVal">8</span>
                <input type="range" id="carbonslider" min="2" max="15" value="8" oninput="sliderVal(this.value)">
            </div>

            <h4 id="text1">Ce aminoacizi foloseste programul:</h4>

            <div id="aminoacidsContainer" class="aminoacids-checkboxes"></div>
            <div id="container-explicatii">
                <span class="no-break">Glicină - 2,</span> 
                <span class="no-break">Alanină - 3,</span> 
                <span class="no-break">Serină - 3,</span>
                <span class="no-break">Cisteină - 3,</span> 
                <span class="no-break">Acid aspartic - 4,</span> 
                <span class="no-break">Valină - 5,</span> 
                <span class="no-break">Ornitină - 5,</span> 
                <span class="no-break">Acid glutamic - 5,</span>
                <span class="no-break">Leucină - 6,</span>
                <span class="no-break">Izoleucină - 6,</span>
                <span class="no-break">Lisină - 6.</span>
            </div>

            <button onclick="genereaza()" id="btnGenerare">Genereaza</button>
        </div>

        <div class="cutieRez">
            <div class="rezultate" id="zonaRez">
                <p id="mesajNumar" style="font-weight:bold; color: #15063d;"></p>
                <div id="cutieRezultate" class="cutie-peptide"></div>
            </div>
        </div>
        <div class="cutieAlegeri">
            <div class="control-alegere" style="margin-bottom:15px; text-align: center;">
                <label style="font-weight: bold; color:#15063d; display: block; margin-bottom: 8px;">
                    Introdu numarul peptidei pentru a vedea formula chimica:
                </label>
                <input type="number" id="inputIndex" min="1" placeholder="Ex: 1">
                <button id="btnFormula" onclick="valideazaSiGenereaza(document.getElementById('inputIndex').value)">
                    Vezi formula
                </button>
            </div>
            <div id="AlegeriText"></div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
